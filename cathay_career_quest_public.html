<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職場冒險家測驗｜金融保險職涯探索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --deep:#12463A;
  --deep2:#0E3A30;
  --mid:#2E9973;
  --mid-soft:#3EAE86;
  --light:#8FDCB4;
  --mint-bg:#F0FAF4;
  --cream:#FFFBF1;
  --gold:#F2B705;
  --gold-soft:#FFD873;
  --coral:#FF8A61;
  --text-dark:#153029;
  --text-mid:#4C6459;
  --text-soft:#7C9186;
  --card-shadow: 0 10px 30px rgba(18,70,58,0.10);
  --card-shadow-hover: 0 14px 36px rgba(18,70,58,0.16);
  --radius-lg: 28px;
  --radius-md: 18px;
  --radius-sm: 12px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:
    radial-gradient(circle at 12% 8%, #E4F5EC 0%, transparent 45%),
    radial-gradient(circle at 90% 85%, #FFF3D9 0%, transparent 40%),
    var(--cream);
  color:var(--text-dark);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.display{font-family:"Baloo 2","Noto Sans TC",sans-serif;}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;padding-bottom:12px;}

/* ---------- top bar ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 6px;
}
.brand{display:flex;align-items:center;gap:8px;font-family:"Baloo 2";font-weight:700;color:var(--deep);font-size:15px;letter-spacing:.5px;}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);}

/* ---------- progress + tree ---------- */
.progress-wrap{padding:6px 22px 4px;}
.progress-track{
  height:10px;background:#E1F0E6;border-radius:20px;overflow:hidden;position:relative;
  box-shadow:inset 0 1px 3px rgba(18,70,58,.12);
}
.progress-fill{
  height:100%;border-radius:20px;
  background:linear-gradient(90deg,var(--mid),var(--light));
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:12px;color:var(--text-soft);}
.chapter-tag{
  font-family:"Baloo 2";font-weight:700;color:var(--mid);background:#E4F5EC;
  padding:3px 10px;border-radius:20px;font-size:11px;letter-spacing:.3px;
}

/* ---------- tree mascot ---------- */
.tree-stage{display:flex;justify-content:center;padding:6px 0 2px;}
.tree-stage svg{width:56px;height:56px;filter:drop-shadow(0 4px 6px rgba(18,70,58,.15));}

/* ---------- screens ---------- */
.screen{flex:1;display:flex;flex-direction:column;padding:8px 22px 28px;animation:fadeIn .45s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ---------- intro ---------- */
.intro-hero{
  background:linear-gradient(160deg,var(--deep) 0%,var(--deep2) 60%);
  border-radius:var(--radius-lg);
  padding:36px 26px 30px;
  color:#fff;position:relative;overflow:hidden;
  box-shadow:var(--card-shadow);
  margin-top:6px;
}
.intro-hero::before{
  content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(242,183,5,.35),transparent 70%);
}
.intro-hero::after{
  content:"";position:absolute;left:-50px;bottom:-60px;width:180px;height:180px;border-radius:50%;
  background:radial-gradient(circle,rgba(143,220,180,.25),transparent 70%);
}
.intro-eyebrow{font-size:12px;letter-spacing:2px;color:var(--gold-soft);font-weight:700;position:relative;}
.intro-title{font-family:"Baloo 2";font-size:26px;line-height:1.5;font-weight:700;margin:10px 0 8px;position:relative;}
.intro-sub{font-size:14px;line-height:1.9;color:#DCEFE4;position:relative;margin-bottom:18px;}
.intro-meta{display:flex;gap:10px;flex-wrap:wrap;position:relative;}
.pill{font-size:12px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:20px;}

.intro-cards{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
.mini-card{
  background:#fff;border-radius:var(--radius-md);padding:16px 18px;
  box-shadow:var(--card-shadow);display:flex;gap:14px;align-items:center;
}
.mini-card .ico{font-size:26px;flex-shrink:0;}
.mini-card .txt strong{display:block;font-size:14px;color:var(--deep);margin-bottom:2px;}
.mini-card .txt span{font-size:12.5px;color:var(--text-mid);line-height:1.6;}

.cta-btn{
  margin-top:26px;background:linear-gradient(135deg,var(--mid),var(--mid-soft));
  color:#fff;border:none;padding:16px;border-radius:20px;font-size:16px;font-weight:700;
  font-family:"Baloo 2";letter-spacing:1px;cursor:pointer;box-shadow:0 10px 22px rgba(46,153,115,.35);
  transition:transform .15s ease, box-shadow .15s ease;
}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 14px 26px rgba(46,153,115,.42);}
.cta-btn:active{transform:translateY(0);}
.cta-secondary{
  margin-top:10px;background:none;border:1.5px solid #CFE6D8;color:var(--mid);
  padding:12px;border-radius:18px;font-size:13.5px;font-weight:600;cursor:pointer;
}

/* ---------- quiz question ---------- */
.q-card{
  background:#fff;border-radius:var(--radius-lg);padding:26px 22px 24px;
  box-shadow:var(--card-shadow);margin-top:10px;flex:1;display:flex;flex-direction:column;
}
.q-chapter-label{font-size:12px;font-weight:700;color:var(--mid);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.q-num{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:10px;background:var(--mint-bg);color:var(--deep);
  font-family:"Baloo 2";font-weight:700;font-size:13px;
}
.q-text{font-size:18px;line-height:1.75;font-weight:700;color:var(--text-dark);margin:6px 0 22px;}
.q-hint{font-size:12.5px;color:var(--text-soft);margin:-14px 0 18px;}

/* scale buttons */
.scale-row{display:flex;flex-direction:column;gap:10px;margin-top:auto;}
.scale-caption{display:flex;justify-content:space-between;font-size:11.5px;color:var(--text-soft);padding:0 2px;margin-bottom:4px;}
.scale-options{display:flex;gap:8px;}
.scale-opt{
  flex:1;aspect-ratio:1/1;border-radius:16px;border:2px solid #E4EFE9;background:#FAFDFB;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;transition:.15s;font-family:"Baloo 2";
}
.scale-opt .num{font-size:18px;font-weight:700;color:var(--text-mid);}
.scale-opt:hover{border-color:var(--light);background:var(--mint-bg);}
.scale-opt.sel{
  background:linear-gradient(150deg,var(--mid),var(--mid-soft));border-color:var(--mid);
  box-shadow:0 8px 18px rgba(46,153,115,.32);
}
.scale-opt.sel .num{color:#fff;}

/* choice cards (multi / single) */
.choice-list{display:flex;flex-direction:column;gap:10px;}
.text-input-wrap{margin-top:auto;}
.text-input{
  width:100%;padding:16px;border-radius:16px;border:2px solid #E4EFE9;background:#FAFDFB;
  font-size:15px;color:var(--text-dark);font-family:"Noto Sans TC",sans-serif;
}
.text-input:focus{outline:none;border-color:var(--mid);background:#fff;}
.choice-card{
  border:2px solid #E4EFE9;border-radius:16px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;
  cursor:pointer;transition:.15s;background:#FAFDFB;
}
.choice-card:hover{border-color:var(--light);background:var(--mint-bg);}
.choice-card.sel{border-color:var(--mid);background:linear-gradient(150deg,#EAF9F1,#F5FFFA);box-shadow:0 6px 14px rgba(46,153,115,.15);}
.choice-mark{
  width:22px;height:22px;border-radius:7px;border:2px solid #CFE0D6;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;transition:.15s;
}
.choice-card.sel .choice-mark{background:var(--mid);border-color:var(--mid);}
.choice-card.single .choice-mark{border-radius:50%;}
.choice-label{font-size:14px;line-height:1.6;color:var(--text-dark);}

.nav-row{display:flex;gap:10px;margin-top:22px;}
.nav-btn{
  flex:1;padding:14px;border-radius:16px;border:none;font-size:14.5px;font-weight:700;cursor:pointer;
  font-family:"Baloo 2",sans-serif;transition:.15s;
}
.nav-btn.next{background:linear-gradient(135deg,var(--mid),var(--mid-soft));color:#fff;box-shadow:0 8px 18px rgba(46,153,115,.3);}
.nav-btn.next:disabled{background:#DCE8E1;color:#A9BDB2;box-shadow:none;cursor:not-allowed;}
.nav-btn.back{background:#F1F5F2;color:var(--text-mid);flex:.55;}

/* ---------- loading ---------- */
.loading-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 30px;}
.loading-screen svg{width:110px;height:110px;margin-bottom:22px;}
.loading-screen p{color:var(--text-mid);font-size:14px;}
.loading-bar{width:200px;height:6px;background:#E1F0E6;border-radius:10px;overflow:hidden;margin-top:16px;}
.loading-bar-fill{height:100%;width:30%;background:linear-gradient(90deg,var(--mid),var(--gold));border-radius:10px;animation:load 1.4s ease-in-out infinite;}
@keyframes load{0%{transform:translateX(-100%);}100%{transform:translateX(400%);}}

/* ---------- result ---------- */
.result-hero{
  background:linear-gradient(160deg,var(--deep),var(--deep2));border-radius:var(--radius-lg);
  color:#fff;padding:32px 24px;text-align:center;position:relative;overflow:hidden;box-shadow:var(--card-shadow);margin-top:8px;
}
.result-hero::before{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(242,183,5,.3),transparent 70%);}
.result-eyebrow{font-size:12px;color:var(--gold-soft);letter-spacing:2px;font-weight:700;position:relative;}
.result-type-icon{font-size:52px;margin:14px 0 6px;position:relative;}
.result-type-name{font-family:"Baloo 2";font-size:24px;font-weight:700;position:relative;}
.result-keywords{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;position:relative;}
.kw{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);font-size:11.5px;padding:5px 11px;border-radius:20px;}

.section-card{background:#fff;border-radius:var(--radius-lg);padding:22px 22px 20px;margin-top:16px;box-shadow:var(--card-shadow);}
.section-title{font-family:"Baloo 2";font-size:15px;font-weight:700;color:var(--deep);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.section-title .badge{width:26px;height:26px;border-radius:9px;background:var(--mint-bg);display:flex;align-items:center;justify-content:center;font-size:14px;}
.result-desc{font-size:13.5px;line-height:1.9;color:var(--text-mid);margin-bottom:14px;}

.gear-rank{display:flex;flex-direction:column;gap:10px;}
.gear-item{display:flex;align-items:center;gap:12px;background:var(--mint-bg);border-radius:14px;padding:12px 14px;}
.gear-medal{font-size:20px;width:28px;text-align:center;}
.gear-icon{font-size:22px;}
.gear-name{font-size:13.5px;font-weight:700;color:var(--text-dark);}
.gear-desc{font-size:11.5px;color:var(--text-soft);margin-top:1px;}

.meter-wrap{margin:6px 0 14px;}
.meter-label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--text-mid);margin-bottom:6px;font-weight:700;}
.meter-track{height:14px;background:#EEF6F1;border-radius:20px;overflow:hidden;}
.meter-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--coral),var(--gold),var(--mid));transition:width .8s ease;}
.tip-box{background:#FFF7E6;border:1px solid #FCE4A8;border-radius:14px;padding:14px 16px;font-size:12.5px;line-height:1.85;color:#7A5B10;margin-top:8px;}
.tip-box b{color:#5C4300;}

.action-row{display:flex;flex-direction:column;gap:10px;margin-top:22px;}
</style>
</head>

async function saveResponse(record){
  if(!SHEET_WEB_APP_URL || SHEET_WEB_APP_URL.indexOf('PASTE_YOUR')===0){
    console.warn('⚠️ 尚未設定 Google 試算表網址，這次作答不會被記錄。請依照說明設定 SHEET_WEB_APP_URL。');
    return;
  }
  const payload = buildSheetPayload(record);
  try{
    await fetch(SHEET_WEB_APP_URL, {
      method:'POST',
      mode:'no-cors', // Apps Script會redirect且不回傳CORS header，用no-cors避免瀏覽器誤判為失敗
      headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // 避免CORS預檢請求，Apps Script端仍會當JSON解析
      body: JSON.stringify(payload)
    });
  }catch(e){
    console.error('送出資料失敗', e);
  }
}

function computeResult(answers){
  const dims = {
    achievement:(answers.q1||0)+(answers.q2||0),
    balance:(answers.q3||0)+(answers.q4||0),
    growth:(answers.q5||0)+(answers.q6||0),
    care:(answers.q7||0)+(answers.q8||0),
    digital:(answers.q9||0)+(answers.q10||0)
  };
  const max = Math.max(...Object.values(dims));
  const topKeys = Object.keys(dims).filter(k=>dims[k]===max).slice(0,2);

  const q11sel = answers.q11 || [];
  const q12sel = answers.q12 || [];
  const q11Score = Q11_OPTIONS.filter(o=>o.correct).filter(o=>q11sel.includes(o.id)).length;
  const q12Score = Q12_OPTIONS.filter(o=>o.correct).filter(o=>q12sel.includes(o.id)).length;
  const q13Score = answers.q13 === 'wrong' ? 1 : 0;
  const claimsRaw = q11Score+q12Score+q13Score;
  const claimsMax = 6+8+1;
  const claimsPct = claimsRaw/claimsMax;
  let claimsLevel = 'low';
  if(claimsPct>=0.7) claimsLevel='high';
  else if(claimsPct>=0.4) claimsLevel='mid';

  const hitDistractor = q11sel.includes('q11_sales') || q12sel.includes('q12_sales');

  const gearScores = Object.keys(GEAR_META).map(id=>({id,score:answers[id]||0,...GEAR_META[id]}));
  gearScores.sort((a,b)=>b.score-a.score);
  const topGear = gearScores.slice(0,3);

  return {dims, topKeys, claimsRaw, claimsMax, claimsPct, claimsLevel, hitDistractor, topGear, q15:answers.q15||0};
}

    <rect x="24" y="${44-trunkH+10}" width="8" height="${trunkH}" rx="3" fill="#8B5E34"/>

}

  const q = QUESTIONS[state.qIndex];
  const total = QUESTIONS.length;
  const pct = Math.round(((state.qIndex)/total)*100);
  const treeStage = q.ch===0?0:(q.ch===1?1:(q.ch===2?2:3));
  const answered = state.answers[q.id];
  const canNext = (q.type==='multi' || q.type==='text') ? true : (answered!==undefined && answered!==null);

  let bodyHTML = '';
  if(q.type==='scale'){
    const val = state.answers[q.id];
    bodyHTML = `
      <div class="scale-row">
        <div>
          <div class="scale-caption"><span>${q.scale[0]}</span><span>${q.scale[4]}</span></div>
          <div class="scale-options">
            ${[1,2,3,4,5].map(n=>`
              <div class="scale-opt ${val===n?'sel':''}" onclick="selectScale('${q.id}',${n})">
                <span class="num">${n}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>`;
  } else if(q.type==='multi'){
    const sel = state.answers[q.id] || [];
    bodyHTML = `<div class="choice-list">
      ${q.options.map(o=>`
        <div class="choice-card ${sel.includes(o.id)?'sel':''}" onclick="toggleMulti('${q.id}','${o.id}')">
          <div class="choice-mark">${sel.includes(o.id)?'✓':''}</div>
          <div class="choice-label">${o.label}</div>
        </div>`).join('')}
    </div>`;
  } else if(q.type==='single'){
    const val = state.answers[q.id];
    bodyHTML = `<div class="choice-list">
      ${q.options.map(o=>`
        <div class="choice-card single ${val===o.id?'sel':''}" onclick="selectSingle('${q.id}','${o.id}')">
          <div class="choice-mark">${val===o.id?'●':''}</div>
          <div class="choice-label" style="font-weight:700;">${o.label}</div>
        </div>`).join('')}
    </div>`;
  } else if(q.type==='text'){
    const val = state.answers[q.id] || '';
    bodyHTML = `<div class="text-input-wrap">
      <input type="email" class="text-input" id="textInput_${q.id}" placeholder="${q.placeholder||''}" value="${val.replace(/"/g,'&quot;')}" oninput="setTextAnswer('${q.id}', this.value)">
    </div>`;
  }

  app.innerHTML = `
    ${topbarHTML()}
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <div class="progress-meta"><span class="chapter-tag">${CH_LABEL[q.ch]}</span><span>${state.qIndex+1} / ${total}</span></div>
    </div>
    <div class="tree-stage">${treeSVG(treeStage)}</div>
    <div class="screen">
      <div class="q-card">
        <div class="q-chapter-label"><span class="q-num">Q${state.qIndex+1}</span> ${q.icon?q.icon+' ':''}</div>
        <div class="q-text">${q.text}</div>
        ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
        ${bodyHTML}
        <div class="nav-row">
          ${state.qIndex>0?`<button class="nav-btn back" onclick="prevQ()">上一題</button>`:''}
          <button class="nav-btn next" id="nextBtn" ${canNext?'':'disabled'} onclick="nextQ()">${state.qIndex===total-1?'完成測驗 🎉':'下一題'}</button>
        </div>
      </div>
    </div>
  `;
}
window.selectScale = function(id,val){
  state.answers[id]=val; renderQuiz();
};
window.toggleMulti = function(id,optId){
  const cur = state.answers[id] || [];
  const idx = cur.indexOf(optId);
  if(idx>-1) cur.splice(idx,1); else cur.push(optId);
  state.answers[id]=cur;
  renderQuiz();
};
window.selectSingle = function(id,val){
  state.answers[id]=val; renderQuiz();
};
window.setTextAnswer = function(id,val){
  state.answers[id]=val;
};
window.prevQ = function(){
  if(state.qIndex>0){ state.qIndex--; render(); }
};
window.nextQ = function(){
  const q = QUESTIONS[state.qIndex];
  if(q.type!=='multi' && q.type!=='text' && (state.answers[q.id]===undefined || state.answers[q.id]===null)) return;
  if(q.id==='screen_age' && state.answers.screen_age==='no'){
    state.screen='ineligible'; render(); return;
  }
  if(state.qIndex < QUESTIONS.length-1){
    state.qIndex++;
    const nextQObj = QUESTIONS[state.qIndex];
    if(nextQObj.ch !== q.ch){
      state.pendingChapter = nextQObj.ch;
      state.screen='chapter-intro';
    }
    render();
  } else {
    finishQuiz();
  }
};

/* ---------- 篩選未通過畫面 ---------- */
function renderIneligible(){
  app.innerHTML = `
    ${topbarHTML()}
    <div class="tree-stage">${treeSVG(0)}</div>
    <div class="screen">
      <div class="intro-hero">
        <div class="intro-eyebrow">感謝你的參與</div>
        <div class="intro-title display">這次的測驗<br>主要想邀請 1997～2012 年出生的朋友參加</div>
        <div class="intro-sub">因為這份問卷是針對 Z 世代求職者的工作價值觀調查，目前還是想先集中蒐集這個年齡區間的想法。真的很謝謝你願意點進來，也歡迎把這份測驗分享給符合條件的朋友！</div>
      </div>
      <button class="cta-secondary" style="margin-top:20px;" onclick="restartQuiz()">🔁 返回首頁</button>
    </div>
  `;
}

/* ---------- Loading -> Result ---------- */
function renderLoading(){
  app.innerHTML = `
    ${topbarHTML()}
    <div class="loading-screen">
      ${treeSVG(3)}
      <div class="display" style="font-size:16px;font-weight:700;color:var(--deep);">正在為你長出職涯樹...</div>
      <p>統計你的冒險家類型與裝備偏好中</p>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    </div>
  `;
}
async function finishQuiz(){
  state.screen='loading'; render();
  const result = computeResult(state.answers);
  state.result = result;

  const record = {
    id: 'r'+Date.now()+Math.random().toString(36).slice(2,8),
    timestamp: Date.now(),
    answers: state.answers,
    dims: result.dims,
    topKeys: result.topKeys,
    claimsRaw: result.claimsRaw,
    claimsLevel: result.claimsLevel,
    topGear: result.topGear.map(g=>g.id),
    q15: result.q15
  };
  await saveResponse(record);

  setTimeout(()=>{ state.screen='result'; render(); }, 1200);
}

/* ---------- 結果頁 ---------- */
function renderResult(){
  const r = state.result;
  const types = r.topKeys.map(k=>TYPE_META[k]);
  const isMixed = types.length>1;
  const primary = types[0];

  const typeHeader = isMixed
    ? `<div class="result-type-icon">${types.map(t=>t.icon).join(' × ')}</div>
       <div class="result-type-name display">${types.map(t=>t.name).join(' × ')}</div>`
    : `<div class="result-type-icon">${primary.icon}</div>
       <div class="result-type-name display">${primary.name}</div>`;

  const kwSet = isMixed ? Array.from(new Set(types.flatMap(t=>t.keywords))).slice(0,6) : primary.keywords;

  const typeDescBlock = types.map(t=>`
    <div style="margin-bottom:${isMixed?'16px':'0'};">
      ${isMixed?`<div style="font-weight:700;color:var(--deep);font-size:13.5px;margin-bottom:6px;">${t.icon} ${t.name}</div>`:''}
      <div class="result-desc">${t.desc}</div>
      ${!isMixed?`
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${t.gear.map((g,i)=>`<div style="display:flex;gap:10px;align-items:center;font-size:13px;color:var(--text-dark);">
          <span>${['🥇','🥈','🥉'][i]}</span><span>${g}</span></div>`).join('')}
      </div>`:''}
    </div>
  `).join('');

  const gearHTML = r.topGear.map((g,i)=>`
    <div class="gear-item">
      <div class="gear-medal">${['🥇','🥈','🥉'][i]}</div>
      <div class="gear-icon">${g.icon}</div>
      <div style="flex:1;">
        <div class="gear-name">${g.name}</div>
        <div class="gear-desc">${g.desc}</div>
      </div>
    </div>
  `).join('');

  const claimsPct = Math.round(r.claimsPct*100);
  const claimsLabel = {high:'熟悉度：高',mid:'熟悉度：中等',low:'熟悉度：待加強'}[r.claimsLevel];

  app.innerHTML = `
    ${topbarHTML()}
    <div class="screen" style="padding-top:2px;">
      <div class="result-hero">
        <div class="result-eyebrow">YOUR ADVENTURER TYPE</div>
        ${typeHeader}
        <div class="result-keywords">${kwSet.map(k=>`<span class="kw">#${k}</span>`).join('')}</div>
      </div>

      <div class="section-card">
        <div class="section-title"><span class="badge">🧭</span>你的職場冒險家類型</div>
        ${typeDescBlock}
      </div>

      <div class="section-card">
        <div class="section-title"><span class="badge">🎒</span>最吸引你的職涯裝備 Top 3</div>
        <div class="gear-rank">${gearHTML}</div>
      </div>

      <div class="section-card">
        <div class="section-title"><span class="badge">📋</span>你對理賠任務的熟悉程度</div>
        <div class="meter-wrap">
          <div class="meter-label"><span>${claimsLabel}</span><span>${claimsPct}%</span></div>
          <div class="meter-track"><div class="meter-fill" style="width:${claimsPct}%;"></div></div>
        </div>
        <div class="result-desc" style="margin-bottom:0;">${CLAIMS_TEXT[r.claimsLevel]}</div>
        ${r.hitDistractor?`<div class="tip-box"><b>💡 ${DISTRACTOR_TIP}</b></div>`:''}
      </div>

      <div class="action-row">
        <button class="cta-btn" onclick="restartQuiz()">🔁 再測一次</button>
      </div>
    </div>
  `;
}
window.restartQuiz = function(){
  state.screen='intro'; state.qIndex=0; state.answers={}; state.result=null;
  render();
};
</script>
</body>
</html>
